{% load crispy_forms_tags %}
<br>
<main class="flex justify-center items-center px-12 py-16 pt-20 min-h-screen mt-40 lg:mt-0 ">
    <div class="w-auto  p-8 shadow-xl rounded-lg animate-slide-in-left border">
        <h1 class="text-2xl font-bold mb-0 text-center">ลงทะเบียนสำหรับเจ้าหน้าที่คณะ</h1>
        <form action="" method="post">
            {% csrf_token %}
            {{ profile_form|crispy }}
            {{ user_form|crispy }}
            <div class="text-center">
                <button type="submit" class="w-full px-4 py-2 bg-blue-400 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:bg-blue-700">ยื่นคำขอลงทะเบียนสำหรับเจ้าหน้าที่คณะ</button>
            </div>
        </form>
    </div>
</main>
<br>
